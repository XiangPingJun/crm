<input type="text" id="FIREBASE_API_KEY" placeholder="FIREBASE_API_KEY">
<input type="text" id="FIREBASE_DB_URL" placeholder="FIREBASE_DB_URL">
<input type="text" id="FIREBASE_EMAIL" placeholder="FIREBASE_EMAIL">
<input type="text" id="FIREBASE_PASSWORD" placeholder="FIREBASE_PASSWORD">
<input type="text" id="AI_API_KEY" placeholder="AI_API_KEY">
<button id="saveBtn">Save</button>

<script>
  document.getElementById("saveBtn").addEventListener("click", function () {
    let fields = ["FIREBASE_API_KEY", "FIREBASE_DB_URL", "FIREBASE_EMAIL", "FIREBASE_PASSWORD", "AI_API_KEY"];

    for (let i = 0; i < fields.length; i++) {
      let value = document.getElementById(fields[i]).value;
      if (value) {
        localStorage[fields[i]] = value;
      }
    }

    alert("Configuration saved!");
  });
</script>
