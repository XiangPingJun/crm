<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body,
    * {
      background-color: #3E3E42;
      color: #E6E6E6;
      font-size: 1.25rem;
    }

    textarea {
      width: 100%;
    }
  </style>
</head>

<body>
  <textarea id="prompt" rows="3"></textarea>
  <select id="chatSelect"></select>
  <label><input type="radio" name="mode" value="chat" checked>Chat</label>
  <label><input type="radio" name="mode" value="profile">Profile</label>
  <button id="submitBtn">詢問</button>
  <div id="content" style="white-space: pre-line;"></div>
  <div></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getDatabase, get, onValue, ref, set } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    let firebaseConfig = {
      apiKey: localStorage.FIREBASE_API_KEY,
      authDomain: "social-crm-80a3a.firebaseapp.com",
      databaseURL: localStorage.FIREBASE_DB_URL,
    };

    let firebaseEmail = localStorage.FIREBASE_EMAIL;
    let firebasePassword = localStorage.FIREBASE_PASSWORD;

    let app = initializeApp(firebaseConfig);
    let auth = getAuth(app);
    let database = getDatabase(app);
    let releaseChatAiListener = null;
    let profileLoadToken = 0;
    let modeRadioElements = document.querySelectorAll('input[name="mode"]');
    let promptElement = document.querySelector("#prompt");
    let chatSelectElement = document.querySelector("#chatSelect");
    let submitBtnElement = document.querySelector("#submitBtn");
    let contentElement = document.querySelector("#content");
    let chatItems = [];
    let aliasMap = {};
    let currentChatName = "";
    let currentProfileText = "";
    let currentChatAiText = "";
    let currentMode = "chat";
    let AI_API_URL = "https://api.together.xyz/v1/chat/completions";
    let ASK_AI_MODEL = "meta-llama/Llama-3.3-70B-Instruct-Turbo";
    let MERGE_AI_MODEL = "meta-llama/Llama-3.3-70B-Instruct-Turbo";

    function normalizeDisplayText(text) {
      return String(text || "").replace(/妳/g, "你");
    }

    function setStatus(text) {
      contentElement.textContent = normalizeDisplayText(text);
    }

    function setControlsDisabled(disabled) {
      let nextDisabled = Boolean(disabled);

      submitBtnElement.disabled = nextDisabled;
      chatSelectElement.disabled = nextDisabled || !chatItems.length;
      promptElement.disabled = nextDisabled;

      for (let i = 0; i < modeRadioElements.length; i++) {
        modeRadioElements[i].disabled = nextDisabled;
      }
    }

    function updateModeUI() {
      for (let i = 0; i < modeRadioElements.length; i++) {
        modeRadioElements[i].checked = modeRadioElements[i].value === currentMode;
      }

      submitBtnElement.textContent = currentMode === "profile" ? "合併" : "詢問";
      promptElement.placeholder = currentMode === "profile"
        ? "輸入要 merge 進 profile 的補充資訊"
        : "輸入要 Ask 的問題";
    }

    function setMode(mode) {
      currentMode = mode === "profile" ? "profile" : "chat";
      updateModeUI();
      renderCurrentContext(currentChatName);
    }

    function decodeFirebaseKey(value) {
      return String(value || "").replace(/%([0-9A-F]{2})/g, function (_, hex) {
        return String.fromCharCode(parseInt(hex, 16));
      });
    }

    function normalizeAliasMap(rawAliases) {
      if (!rawAliases || typeof rawAliases !== "object") {
        return {};
      }

      let keys = Object.keys(rawAliases);
      let normalizedAliases = {};

      for (let i = 0; i < keys.length; i++) {
        let aliasName = decodeFirebaseKey(keys[i]).trim();
        let primaryName = rawAliases[keys[i]] !== undefined && rawAliases[keys[i]] !== null
          ? String(rawAliases[keys[i]]).trim()
          : "";

        if (!aliasName || !primaryName) {
          continue;
        }

        normalizedAliases[aliasName] = primaryName;
      }

      return normalizedAliases;
    }

    function resolvePrimaryChatName(chatName) {
      let normalizedChatName = chatName ? String(chatName).trim() : "";
      if (!normalizedChatName) {
        return "";
      }

      let primaryChatName = aliasMap[normalizedChatName] ? String(aliasMap[normalizedChatName]).trim() : "";
      return primaryChatName || normalizedChatName;
    }

    function renderChatOptions() {
      let selectedChatName = chatSelectElement.value;
      let preferredChatName = currentChatName || selectedChatName;

      chatSelectElement.innerHTML = "";

      if (!chatItems.length) {
        let option = document.createElement("option");
        option.value = "";
        option.textContent = "等待 chat_updated...";
        chatSelectElement.appendChild(option);
        chatSelectElement.disabled = true;
        currentChatName = "";
        syncSelectedChat("");
        return;
      }

      setControlsDisabled(false);

      for (let i = 0; i < chatItems.length; i++) {
        let chatItem = chatItems[i];
        let option = document.createElement("option");
        option.value = chatItem.name;
        option.textContent = chatItem.label;
        chatSelectElement.appendChild(option);
      }

      if (preferredChatName && chatItems.some(function (chatItem) { return chatItem.name === preferredChatName; })) {
        chatSelectElement.value = preferredChatName;
      } else {
        chatSelectElement.value = chatItems[0].name;
      }

      if (chatSelectElement.value !== currentChatName) {
        syncSelectedChat(chatSelectElement.value);
      }
    }

    function escapeFirebaseKey(value) {
      return String(value || "").replace(/[.#$\/\[\]\u0000-\u001F\u007F]/g, function (char) {
        return "%" + char.charCodeAt(0).toString(16).toUpperCase();
      });
    }

    function getElapsedDaysLabel(timestamp) {
      let elapsedTime = Date.now() - (Number(timestamp) || 0);
      let elapsedDays = Math.floor(elapsedTime / (24 * 60 * 60 * 1000));

      if (elapsedDays < 0) {
        elapsedDays = 0;
      }

      return String(elapsedDays);
    }

    function normalizeChatNamesFromUpdatedMap(updatedMap) {
      if (!updatedMap || typeof updatedMap !== "object") {
        return [];
      }

      let keys = Object.keys(updatedMap);
      keys.sort(function (left, right) {
        return (Number(updatedMap[right]) || 0) - (Number(updatedMap[left]) || 0);
      });

      let normalizedNames = [];

      for (let i = 0; i < keys.length; i++) {
        let chatName = decodeFirebaseKey(keys[i]);
        let elapsedDays = getElapsedDaysLabel(updatedMap[keys[i]]);

        normalizedNames.push({
          name: chatName,
          label: chatName + "(" + elapsedDays + ")",
        });
      }

      return normalizedNames;
    }

    function buildProfileText(profile, prefix) {
      let label = prefix ? String(prefix) : "";

      if (profile === null || profile === undefined) {
        return "";
      }

      if (typeof profile === "string" || typeof profile === "number" || typeof profile === "boolean") {
        return label + String(profile).trim();
      }

      if (Array.isArray(profile)) {
        let lines = [];

        for (let i = 0; i < profile.length; i++) {
          let itemText = buildProfileText(profile[i], label ? label + (i + 1) + ": " : "");
          if (itemText) {
            lines.push(itemText);
          }
        }

        return lines.join("\n");
      }

      if (typeof profile === "object") {
        let keys = Object.keys(profile);
        let lines = [];

        for (let i = 0; i < keys.length; i++) {
          let key = keys[i];
          let itemText = buildProfileText(profile[key], key + ": ");
          if (itemText) {
            lines.push(itemText);
          }
        }

        return lines.join("\n");
      }

      return "";
    }

    function extractOpenRouterText(content) {
      if (!content) {
        return "";
      }

      if (typeof content === "string") {
        return content;
      }

      if (!Array.isArray(content)) {
        return "";
      }

      return content.map(function (item) {
        if (typeof item === "string") {
          return item;
        }

        if (item && typeof item.text === "string") {
          return item.text;
        }

        return "";
      }).filter(Boolean).join("\n");
    }

    function renderContent(content) {
      let normalizedContent = normalizeDisplayText(content || "目前 chat_ai 沒有內容");
      let fullText = normalizedContent;
      let fragment = document.createDocumentFragment();
      let pattern = /〖([\s\S]*?)〗/g;
      let lastIndex = 0;
      let match = null;

      while ((match = pattern.exec(fullText))) {
        if (match.index > lastIndex) {
          fragment.appendChild(document.createTextNode(fullText.slice(lastIndex, match.index)));
        }

        fragment.appendChild(document.createTextNode(match[1]));

        let copyButton = document.createElement("button");
        copyButton.type = "button";
        copyButton.className = "copy-button";
        copyButton.dataset.copyText = match[1];
        copyButton.textContent = "⧉";
        copyButton.style.marginLeft = "0.25em";
        fragment.appendChild(copyButton);

        lastIndex = pattern.lastIndex;
      }

      if (lastIndex < fullText.length) {
        fragment.appendChild(document.createTextNode(fullText.slice(lastIndex)));
      }

      contentElement.replaceChildren(fragment);
    }

    function renderEmpty(message) {
      contentElement.textContent = normalizeDisplayText(message);
    }

    function buildContextContent(mode, profileText, chatAiText) {
      let normalizedMode = mode === "profile" ? "profile" : "chat";
      let normalizedProfileText = String(profileText || "").trim() || "目前沒有 profile";
      let normalizedChatAiText = String(chatAiText || "").trim() || "目前 chat_ai 沒有內容";

      if (normalizedMode === "profile") {
        return [
          normalizedProfileText,
        ].join("\n");
      }

      return [
        normalizedChatAiText,
      ].join("\n");
    }

    function renderCurrentContext(chatName) {
      let primaryChatName = resolvePrimaryChatName(chatName);

      if (!primaryChatName) {
        renderEmpty("等待 Firebase 更新...");
        return;
      }

      renderContent(buildContextContent(currentMode, currentProfileText, currentChatAiText));
    }

    async function readChatProfile(chatName) {
      let primaryChatName = resolvePrimaryChatName(chatName);
      let chatKey = escapeFirebaseKey(primaryChatName);
      let profileRef = ref(database, "profile/" + chatKey);
      let snapshot = await get(profileRef);

      return snapshot.exists() ? snapshot.val() : null;
    }

    async function loadSelectedProfile(chatName) {
      let requestToken = ++profileLoadToken;
      let normalizedChatName = chatName ? String(chatName).trim() : "";

      if (!normalizedChatName) {
        currentProfileText = "";
        renderCurrentContext("");
        return;
      }

      currentProfileText = "載入 profile 中...";
      renderCurrentContext(normalizedChatName);

      try {
        let profile = await readChatProfile(normalizedChatName);

        if (requestToken !== profileLoadToken) {
          return;
        }

        currentProfileText = buildProfileText(profile, "");
        renderCurrentContext(normalizedChatName);
      } catch (error) {
        if (requestToken !== profileLoadToken) {
          return;
        }

        currentProfileText = "載入 profile 失敗: " + (error && error.message ? error.message : error);
        renderCurrentContext(normalizedChatName);
      }
    }

    function syncSelectedChat(chatName) {
      let normalizedChatName = chatName ? String(chatName).trim() : "";

      watchChatAi(normalizedChatName);
      loadSelectedProfile(normalizedChatName);
    }

    function watchChatAi(chatName) {
      currentChatName = chatName || "";

      if (releaseChatAiListener) {
        releaseChatAiListener();
        releaseChatAiListener = null;
      }

      if (!chatName) {
        currentChatAiText = "";
        renderEmpty("等待 Firebase 更新...");
        return;
      }

      let primaryChatName = resolvePrimaryChatName(chatName);
      let chatKey = escapeFirebaseKey(primaryChatName);
      let chatAiRef = ref(database, "chat_ai/" + chatKey);

      currentChatAiText = "載入 chat_ai 中...";
      renderCurrentContext(primaryChatName);

      releaseChatAiListener = onValue(chatAiRef, function (snapshot) {
        currentChatAiText = snapshot.val() || "目前 chat_ai 沒有內容";
        renderCurrentContext(primaryChatName);
      }, function (error) {
        currentChatAiText = error.message || "chat_ai 監聽失敗";
        renderCurrentContext(primaryChatName);
      });
    }

    async function readChatContext(chatName) {
      let primaryChatName = resolvePrimaryChatName(chatName);
      let chatKey = escapeFirebaseKey(primaryChatName);
      let profileRef = ref(database, "profile/" + chatKey);
      let chatsRef = ref(database, "chats/" + chatKey);
      let results = await Promise.all([get(profileRef), get(chatsRef)]);

      return {
        profile: results[0].exists() ? results[0].val() : null,
        chats: results[1].exists() ? results[1].val() : "",
      };
    }

    async function readAboutMe() {
      let aboutMeRef = ref(database, "about_me");
      let snapshot = await get(aboutMeRef);

      if (!snapshot.exists()) {
        return "";
      }

      return String(snapshot.val() || "").trim();
    }

    function buildAskOpenRouterMessages(aboutMe, profile, chats, prompt) {
      return {
        systemPrompt: [
          "你是 Social CRM 對話助理。",
          "請只根據提供的背景、對象 profile 與聊天紀錄回答。",
          "使用繁體中文，回答要直接、具體。",
        ].join("\n"),
        userPrompt: [
          "我的背景:",
          aboutMe || "",
          "",
          "對象 profile:",
          buildProfileText(profile, "") || "",
          "",
          "聊天紀錄:",
          chats || "",
          "",
          "我的提問:",
          prompt || "",
        ].join("\n"),
      };
    }

    function buildMergeMessages(aboutMe, profile, chats, prompt) {
      return {
        systemPrompt: [
          "# Role & Objective",
          "你是一個專業的 Social CRM 記憶管理員兼人際關係戰略分析師。你的任務是閱讀使用者與聯絡人的「最新對話紀錄」，精準地將該聯絡人進行「3+1 人物歸類」，評估其「社交溫度（回覆熱度）」，並將重要資訊高密度地萃取、更新至該聯絡人的「現有長期記憶檔案」中。",
          "",
          "# 主體辨識規則",
          "1. 你要整理的是『對象』的 profile，不是『我』的 profile。",
          "2. 下方 <about_me> 是『我』的背景資料，只能用來辨識對話中的主客體，絕對不能寫進對象 profile。",
          "3. 若對話內容提到的是我自己的背景、經歷、偏好、需求、計畫、情緒、價值觀，全部排除，不得整理進對象 profile。",
          "4. 只有明確屬於對象的資訊，才可以保留在輸出中；主體不明時寧可略過，不要誤收錄。",
          "",
          "# The 3+1 Personas (人物分類定義)",
          "請根據對話所展現的互動模式，從以下分類中挑選最合適的一項：",
          "1. 🌟 戰略節點 (Strategic Nodes)：話題涉及人脈引薦。價值：擴展網路與尋找潛在伴侶的泉源。",
          "2. 🧠 智囊同儕 (Intellectual Peers)：業界前輩、強者或同事。交流內容高度邏輯化，專注專業知識、投資或未來趨勢。價值：維持事業競爭力。",
          "3. ☕ 維繫型關係 (Low-Maintenance Bonds)：包含情緒避風港、特定興趣同好、生命見證人、遠距離或內向朋友。無功利目的，對話包容度高。價值：提供情緒緩衝與陪伴。",
          "4. 💖 核心漏斗 (Romantic Pipeline)：明顯為潛在伴侶對象。對話包含高度好感試探、約會安排或深度價值觀交流。",
          "",
          "# Rules & Logic",
          "1. 唯一歸類：必須挑選「一個」最符合的主類別。若資訊極度缺乏，請標記為「⏳ 觀察中 (Pending)」。",
          "2. 動態萃取深度：",
          "   - 針對 🌟、🧠、💖：請全面萃取其喜好、人際網路、價值觀、新話題，並敏銳捕捉其「潛在需求與願望」。",
          "   - 針對 ☕ (維繫型關係)：以保留最基本的「主要特徵標籤」為主，並【極度嚴格】地捕捉並記錄「絕對不能碰的地雷」，忽略其餘無關緊要的瑣碎細節。",
          "3. 矛盾去重與覆蓋 (Overwrite)：人的喜好與狀態會改變。如果最新對話出現與舊記憶衝突的資訊（如：以前愛喝咖啡，現在戒了），請直接「覆蓋」舊資訊，保留最新狀態。絕不可並列矛盾資訊。",
          "4. 話題剔除機制 (Topic Deletion)：請交叉比對「最新對話紀錄」與現有的「💡 未聊的新話題」。如果現有話題已被聊過，請務必將該話題從清單中刪除。",
          "5. 情感熱度判斷 (Text-Only Engagement)：忽略時間，僅憑文字互動評估。🟢 綠燈 (主動反問/延伸話題)；🟡 黃燈 (禮貌敷衍/句號型回覆)；🔴 紅燈 (軟性阻斷/極端單字敷衍)。",
          "6. 觀感推測 (Perception Inference)：從對方的語氣、主動性與依賴感中，推測對方將使用者定位為什麼角色。",
          "7. 絕對格式要求：嚴格依照下方 Markdown 格式輸出，使用 Emoji 作為視覺錨點。不要包含任何問候語或解釋文字。若某分類無資料，保留標題並留白。",
          "",
          "# Output Format (Strict)",
          "## 🏷️ 人物歸類",
          "* **標籤**: (🌟 戰略節點 | 🧠 智囊同儕 | ☕ 維繫型關係 | 💖 核心漏斗 | ⏳ 觀察中)",
          "* **推論理由**: (請用 50 字內說明歸類原因。若為維繫型關係，請加註主要標籤，如：打遊戲、南部朋友)",
          "",
          "## 🌡️ 社交溫度計",
          "* **燈號**: (🟢 綠燈 | 🟡 黃燈 | 🔴 紅燈)",
          "* **推論理由**: (請用 50 字內說明歸類原因)",
          "",
          "## 🎭 對方對我的觀感推測",
          "* **定位推測**: (例如：可依賴的專家、有趣的玩伴、單向傾聽的樹洞、潛在發展對象)",
          "* **判斷依據**: (簡述從哪些對話細節或語氣得出此推測)",
          "",
          "## 🤲 潛在需求與送禮清單",
          "* (請條列從對話中發現的對方痛點、願望清單，或是未來你可以主動提供的價值、協助與適合送的禮物)",
          "",
          "## 💡 未聊的新話題",
          "* (請條列還未聊過、適合下次開啟的新話題)",
          "",
          "## 🧠 長期記憶",
          "* (請條列更新後的核心特徵與近況)",
          "",
          "## 🎯 偏好與地雷",
          "* **喜歡**: (請條列更新後的喜好)",
          "* **地雷/討厭**: (請條列更新後的地雷，☕ 維繫型關係請特別著重此項)",
          "",
          "## 🤝 人際網路",
          "* **(人名)**: (關係描述，若是戰略節點，請特別記錄引薦過誰)",
          "",
          "## 🎁 歷史行動與送禮紀錄",
          "* (請條列過去雙方禮尚往來或互相幫忙的紀錄)",
        ].join("\n"),
        userPrompt: [
          "# Input Data",
          "<about_me>",
          aboutMe || "",
          "</about_me>",
          "",
          "<current_profile>",
          buildProfileText(profile, "") || "",
          "</current_profile>",
          "",
          "<additional_input>",
          prompt || "",
          "</additional_input>",
          "",
          "<recent_conversations>",
          chats || "",
          "</recent_conversations>",
        ].join("\n"),
      };
    }

    async function saveMergedProfile(chatName, profileText) {
      let primaryChatName = resolvePrimaryChatName(chatName);
      let chatKey = escapeFirebaseKey(primaryChatName);
      let profileRef = ref(database, "profile/" + chatKey);
      let toBeDeletedRef = ref(database, "to_be_deleted/" + chatKey);

      await Promise.all([
        set(profileRef, profileText),
        set(toBeDeletedRef, {
          chatName: primaryChatName,
        }),
      ]);
    }

    async function requestAI(systemPrompt, userPrompt, model) {
      let messages = [];

      if (systemPrompt) {
        messages.push({
          role: "system",
          content: systemPrompt,
        });
      }

      messages.push({
        role: "user",
        content: userPrompt,
      });

      let response = await fetch(AI_API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + localStorage.AI_API_KEY,
        },
        body: JSON.stringify({
          model: model,
          messages: messages,
        }),
      });

      let data = await response.json();

      if (!response.ok) {
        throw new Error(data && data.error && data.error.message ? data.error.message : JSON.stringify(data));
      }

      let choice = data && data.choices && data.choices.length ? data.choices[0] : null;
      let message = choice && choice.message ? choice.message : null;
      let content = extractOpenRouterText(message ? message.content : "");

      if (!content) {
        throw new Error("AI API 回傳內容為空");
      }

      return content;
    }

    async function handleAsk() {
      let selectedChatName = chatSelectElement.value ? String(chatSelectElement.value).trim() : "";

      if (!selectedChatName) {
        setStatus("目前沒有可送出的 chat");
        return;
      }

      if (!localStorage.AI_API_KEY) {
        setStatus("缺少 localStorage.AI_API_KEY");
        return;
      }

      try {
        setControlsDisabled(true);
        setStatus("讀取資料中...");

        let results = await Promise.all([
          readChatContext(selectedChatName),
          readAboutMe(),
        ]);
        let chatContext = results[0];
        let aboutMe = results[1];
        let promptPayload = buildAskOpenRouterMessages(
          aboutMe,
          chatContext.profile,
          chatContext.chats,
          promptElement.value || ""
        );

        setStatus("送出 AI API...");
        let answer = await requestAI(
          promptPayload.systemPrompt,
          promptPayload.userPrompt,
          ASK_AI_MODEL
        );
        promptElement.value = "";
        renderContent(answer, []);
      } catch (error) {
        setStatus("失敗: " + (error && error.message ? error.message : error));
      } finally {
        setControlsDisabled(false);
        renderChatOptions();
      }
    }

    async function handleMerge() {
      let selectedChatName = chatSelectElement.value ? String(chatSelectElement.value).trim() : "";
      let mergeSourceText = promptElement.value ? String(promptElement.value).trim() : "";

      if (!selectedChatName) {
        setStatus("目前沒有可合併的 chat");
        return;
      }

      if (!localStorage.AI_API_KEY) {
        setStatus("缺少 localStorage.AI_API_KEY");
        return;
      }

      try {
        setControlsDisabled(true);
        setStatus("讀取 Firebase 資料中...");

        let results = await Promise.all([
          readChatContext(selectedChatName),
          readAboutMe(),
        ]);
        let chatContext = results[0];
        let aboutMe = results[1];
        let promptPayload = buildMergeMessages(
          aboutMe,
          chatContext.profile,
          chatContext.chats,
          mergeSourceText
        );

        setStatus("送出 AI API 合併 profile...");
        let mergedProfile = await requestAI(
          promptPayload.systemPrompt,
          promptPayload.userPrompt,
          MERGE_AI_MODEL
        );

        setStatus("回存 profile 並標記待刪除...");
        await saveMergedProfile(selectedChatName, mergedProfile);
        promptElement.value = "";
        currentProfileText = mergedProfile;
        renderCurrentContext(selectedChatName);
      } catch (error) {
        setStatus("失敗: " + (error && error.message ? error.message : error));
      } finally {
        setControlsDisabled(false);
        renderChatOptions();
      }
    }

    async function main() {
      try {
        updateModeUI();
        setStatus("登入 Firebase");
        await signInWithEmailAndPassword(auth, firebaseEmail, firebasePassword);
        setStatus("");

        let aliasesRef = ref(database, "aliases");
        onValue(aliasesRef, function (snapshot) {
          aliasMap = normalizeAliasMap(snapshot.val());
        });

        let chatUpdatedRef = ref(database, "chat_updated");
        onValue(chatUpdatedRef, function (snapshot) {
          chatItems = normalizeChatNamesFromUpdatedMap(snapshot.val());
          renderChatOptions();
        }, function (error) {
          setStatus("chat_updated 監聽失敗: " + error.message);
        });
      } catch (error) {
        setStatus("初始化失敗");
      }
    }

    for (let i = 0; i < modeRadioElements.length; i++) {
      modeRadioElements[i].addEventListener("change", function (event) {
        let target = event.target;
        setMode(target && target.value ? target.value : "chat");
      });
    }

    submitBtnElement.addEventListener("click", function () {
      if (currentMode === "profile") {
        handleMerge();
        return;
      }

      handleAsk();
    });

    chatSelectElement.addEventListener("change", function () {
      let selectedChatName = chatSelectElement.value ? String(chatSelectElement.value).trim() : "";
      syncSelectedChat(selectedChatName);
    });

    contentElement.addEventListener("click", async function (event) {
      let target = event.target;

      if (!(target instanceof HTMLButtonElement) || !target.classList.contains("copy-button")) {
        return;
      }

      let copyText = target.dataset.copyText || "";
      let originalText = target.textContent;

      try {
        await navigator.clipboard.writeText(copyText);
        target.textContent = "✔";
      } catch (error) {
        target.textContent = "複製失敗";
      }

      window.setTimeout(function () {
        target.textContent = originalText || "複製";
      }, 1200);
    });

    main();
  </script>
</body>

</html>
